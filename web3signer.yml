x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: "3"
      tag: '{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}'

services:
  w3s-init:
    restart: "no"
    build:
      context: ./web3signer
      args:
        - DOCKER_TAG=${W3S_DOCKER_TAG:-latest}
        - DOCKER_REPO=${W3S_DOCKER_REPO:-consensys/web3signer}
      dockerfile: Dockerfile.init
    image: w3s-init:local
    pull_policy: never
    volumes:
      - web3signer-slashing-data:/var/lib/postgres-data:ro
    environment:
      - PG_DOCKER_TAG=${PG_DOCKER_TAG}
    depends_on:
      postgres:
        condition: service_healthy
    <<: *logging
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -Eeu
        data_dir=/var/lib/postgres-data
        upgrade_marker="$${data_dir}/upgrade_in_progress.lock"
        echo "Checking database state at $${data_dir} ..."
        # A failed PostgreSQL version upgrade should fail postgres, so this never runs. Belt and suspenders.
        if [[ -f "$${upgrade_marker}" ]]; then
          echo "ERROR: Upgrade marker found! A previous PostgreSQL upgrade attempt failed or was interrupted."
          echo "Manual intervention required to prevent slashing."
          sleep 30
          exit 1
        fi
        if [[ -f "$${data_dir}/PG_VERSION" ]]; then
          version=$$(cat "$${data_dir}/PG_VERSION")
          # A mismatch should fail postgres, so this never runs. Belt and suspenders.
          if [[ "$${version}" != "$${PG_DOCKER_TAG%%[^0-9]*}" ]]; then
            echo "ERROR: The slashing protection database is version $${version}, but the image is $${PG_DOCKER_TAG}."
            echo "Aborting, PostgreSQL may have created a blank database."
            echo "Manual intervention required to prevent slashing."
            sleep 30
            exit 1
          fi
        fi
        exec /flyway/flyway migrate \
        -url=jdbc:postgresql://${PG_ALIAS}/web3signer \
        -user=postgres -password=postgres \
        -locations=filesystem:/tmp/web3signer

  web3signer:
    restart: "unless-stopped"
    build:
      context: ./web3signer
      args:
        - DOCKER_TAG=${W3S_DOCKER_TAG:-latest}
        - DOCKER_REPO=${W3S_DOCKER_REPO:-consensys/web3signer}
      dockerfile: Dockerfile.binary
    image: web3signer:local
    pull_policy: never
    user: web3signer
    volumes:
      - web3signer-keys:/var/lib/web3signer
      - /etc/localtime:/etc/localtime:ro
    environment:
      - JAVA_OPTS=${W3S_HEAP:--Xmx6g}
      - NETWORK=${NETWORK}
      - PG_ALIAS=${PG_ALIAS:-${NETWORK}-postgres}
    networks:
      default:
        aliases:
          # This allows multiple Eth Docker stacks all connected to the same bridge network
          - ${W3S_ALIAS:-${NETWORK}-web3signer}
    depends_on:
      w3s-init:
        condition: service_completed_successfully
    <<: *logging
    entrypoint:
      - docker-entrypoint.sh
      - /opt/web3signer/bin/web3signer
      - --key-store-path=/var/lib/web3signer/keys
      - --metrics-enabled
      - --metrics-host-allowlist=*
      - --http-host-allowlist=*
      - --logging=${LOG_LEVEL:-info}
      - eth2
      - --enable-key-manager-api=true
      - --slashing-protection-db-url=jdbc:postgresql://${PG_ALIAS:-${NETWORK}-postgres}/web3signer
      - --slashing-protection-db-username=postgres
      - --slashing-protection-db-password=postgres
      - --slashing-protection-pruning-enabled=true
    labels:
      - metrics.scrape=true
      - metrics.path=/metrics
      - metrics.port=9001
      - metrics.instance=web3signer
      - metrics.network=${NETWORK}

  postgres:
    restart: "unless-stopped"
    image: "postgres:${PG_DOCKER_TAG}"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=web3signer
      - PGDATA=/var/lib/postgres-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 5s
      interval: 10s
      timeout: 5s
    volumes:
      - web3signer-slashing-data:/var/lib/postgres-data
    networks:
      default:
        aliases:
          # This allows multiple Eth Docker stacks all connected to the same bridge network
          - ${PG_ALIAS:-${NETWORK}-postgres}

volumes:
  web3signer-keys:
  web3signer-slashing-data:
