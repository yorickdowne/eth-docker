x-logging: &logging
  logging:
    driver: ${LOG_DRIVER}
    options:
      max-size: ${LOG_MAX_SIZE}
      max-file: ${LOG_MAX_FILE}
      tag: ${LOG_TAG}

services:
  cb-pbs:
    restart: "unless-stopped"
    image: ${CB_DOCKER_REPO:-ghcr.io/commit-boost/commit-boost}:${CB_DOCKER_TAG:-latest}
    environment:
      CB_CONFIG: /cb-config.toml
    volumes:
      - ./commit-boost/cb-config.toml:/cb-config.toml:ro
    networks:
      default:
        aliases:
          # This allows multiple Eth Docker stacks all connected to the same bridge network
          - ${MEV_ALIAS:-default-mev}
    entrypoint:
      - commit-boost
      - pbs
    labels:
      - metrics.scrape=true
      - metrics.path=/metrics
      - metrics.port=10000
      - metrics.instance=cb-pbs
      - metrics.network=${NETWORK}
      - logs.collect=true
